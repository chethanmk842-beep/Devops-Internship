<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Internship Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #2c3e50; }
        .status-box {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            margin: 20px 0;
            border: 1px solid #c8e6c9;
        }
        .info { color: #7f8c8d; font-size: 0.9rem; }
        .version { font-family: monospace; color: #3498db; }
    </style>
</head>
<body>

    <div class="container">
        <h1>DevOps Pipeline Test</h1>
        <p>This application is used to verify deployment automation.</p>
        
        <div class="status-box">
            System Status: ONLINE
        </div>

        <p class="info">App Version: <span class="version">v1.0.2</span></p>
        <p class="info">Build Date: March 2026</p>
    </div>

</body>
</html>
